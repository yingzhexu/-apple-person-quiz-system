<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>苹果人答题系统</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="stage">
        <section class="quiz-panel">
          <div class="creator">小应同学ying制作</div>
          <div class="topbar">
            <div>
              <h1>苹果人答题系统</h1>
              <p class="title-en">Apple Person Quiz System</p>
            </div>
            <div class="controls">
              <button class="lang-toggle" id="langBtn">EN</button>
              <button class="icon-button" id="voiceBtn" title="语音播报" aria-label="语音播报">
                <span class="voice-glyph" aria-hidden="true"></span>
              </button>
              <button class="icon-button" id="fxBtn" title="答题音效" aria-label="答题音效">
                <span class="fx-glyph" aria-hidden="true"></span>
              </button>
              <button class="ghost-button" id="homeBtn">主页</button>
              <button class="ghost-button" id="restartBtn">重开</button>
            </div>
          </div>
          <div class="speech" id="speech">准备开始 / Ready to begin</div>
          <div class="pay-overlay hidden" id="payOverlay" aria-hidden="true">
            <div class="pay-card">
              <svg class="checkmark" viewBox="0 0 96 96">
                <circle cx="48" cy="48" r="42"></circle>
                <path d="M29 49.5 42.2 62 68 34"></path>
              </svg>
            </div>
          </div>

          <div class="start-view" id="startView">
            <div class="mode-picker" id="modePicker" aria-label="选择题量">
              <button class="mode-option" data-size="10">10题</button>
              <button class="mode-option active" data-size="20">20题</button>
              <button class="mode-option" data-size="50">50题</button>
              <button class="mode-option" data-size="100">100题</button>
            </div>
            <button class="primary-button" id="startBtn">开始</button>
            <button class="apple-person-button" id="applePersonBtn">我是苹果人</button>
          </div>

          <div class="final-intro hidden" id="finalIntro">
            <h2>既然你是苹果人了</h2>
            <p>请接受最终测试（50）道</p>
            <button class="primary-button" id="finalStartBtn">开始最终测试</button>
          </div>

          <div class="quiz-view hidden" id="quizView">
            <div class="meter-row">
              <span id="progressText">第 1 题</span>
              <span id="streakText">连对 0</span>
              <span id="scoreText">得分 0</span>
            </div>
            <div class="meter"><div id="meterFill"></div></div>
            <article class="question-card">
              <h2 id="questionText"></h2>
              <div class="options" id="options"></div>
            </article>
            <div class="action-row">
              <button class="ghost-button" id="nextBtn" disabled>下一题</button>
            </div>
          </div>

          <div class="result-view hidden" id="resultView">
            <p class="kicker">成绩</p>
            <h2 id="resultTitle">答题完成</h2>
            <div class="achievement-card" id="achievementCard"></div>
            <p id="resultText"></p>
            <div class="result-grid">
              <div><strong id="finalScore">0</strong><span>正确数</span></div>
              <div><strong id="finalRate">0%</strong><span>正确率</span></div>
            </div>
            <button class="primary-button" id="againBtn">再来一次</button>
          </div>
        </section>
      </section>
    </main>
    <div class="achievement-toast hidden" id="achievementToast"></div>
    <div class="secret-modal hidden" id="secretModal" aria-hidden="true">
      <div class="secret-card">
        <p class="kicker">测试后门</p>
        <h2>选择满分题量</h2>
        <div class="secret-grid">
          <button data-perfect-size="10">10题满分</button>
          <button data-perfect-size="20">20题满分</button>
          <button data-perfect-size="50">50题满分</button>
          <button data-perfect-size="100">100题满分</button>
          <button data-perfect-size="final">最终测试满分</button>
        </div>
        <button class="ghost-button" id="secretCloseBtn">取消</button>
      </div>
    </div>
    <script src="questions-en.js"></script>
    <script src="questions-en-201-300.js"></script>
    <script src="questions-en-301-400.js"></script>
    <script src="questions-en-401-500.js"></script>
    <script src="questions-en-final.js"></script>
    <script src="app.js"></script>
  </body>
</html>
